stages:
  - build
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

# ==========================================
# STAGE 1: Build Image on GitLab Cloud
# ==========================================
build_backend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    # Authenticate to GitLab's built-in container registry
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Build your Docker container using the Dockerfile in your repo
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    # Push the compiled image to GitLab's container registry
    - docker push $CI_REGISTRY_IMAGE:latest

# ==========================================
# STAGE 2: Lightweight Deploy to Droplet
# ==========================================
deploy_to_droplet:
  stage: deploy
  image: alpine:latest
  before_script:
    # Install an SSH client into the temporary GitLab pipeline runner
    - apk add --no-cache openssh-client
    # Start the SSH agent and load your private deployment key
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    # SSH into your droplet and run deployment commands sequentially
    - |
      ssh -o StrictHostKeyChecking=no $DROPLET_USER@$DROPLET_IP "
        # 1. Log into your GitLab registry from inside the Droplet
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        
        # 2. Stop and remove the old running container safely (if it exists)
        docker stop backend_app || true &&
        docker rm backend_app || true &&
        
        # 3. Pull down the fresh production image built in Stage 1
        docker pull $CI_REGISTRY_IMAGE:latest &&
        
        # 4. Spin up your backend container (bounded only to 127.0.0.1 for Cloudflare Tunnel)
        docker run -d \
          --name backend_app \
          --restart always \
          -p 127.0.0.1:3211:3001 \
          $CI_REGISTRY_IMAGE:latest &&
          
        # 5. CRUCIAL FOR 2GB RAM: Clear out old images to preserve disk & RAM space
        docker system prune -f
      "
  only:
    # This pipeline will only run automatically when you push code to your main branch
    - main