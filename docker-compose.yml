services:
  db:
    image: postgres:16-alpine
    container_name: project_ip2_backend_db
    environment:
      POSTGRES_DB: ${DB_NAME:-student_part_time}
      POSTGRES_USER: ${DB_USERNAME:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Hnh00900}
    ports:
      - "${DB_EXPOSE_PORT:-5432}:5432"
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-root} -d ${DB_NAME:-student_part_time}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project_ip2_backend
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3211}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-Hnh00900}
      DB_NAME: ${DB_NAME:-student_part_time}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3211}:3211"
    restart: unless-stopped

volumes:
  backend_postgres_data: